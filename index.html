<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Moje Maturitní Knihy</title>
    <meta name="description" content="Digitální čtenářský deník – 20 vybraných děl k maturitě z češtiny s rozbory, postavami a kontextem.">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Playfair+Display:wght@700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Přepínač tmavého režimu -->
    <button class="theme-toggle" id="theme-toggle" aria-label="Přepnout tmavý režim" title="Tmavý/Světlý režim">
        <svg class="icon-sun" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
        <svg class="icon-moon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
    </button>

    <!-- Kvíz tlačítko -->
    <button class="quiz-toggle" id="quiz-toggle" aria-label="Spustit kvíz" title="Kvíz režim">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"/><circle cx="12" cy="12" r="10"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
    </button>

    <header>
        <!-- Odpočet do maturity -->
        <div class="countdown-badge" id="countdown-badge"></div>

        <h1>Maturitní Knihy</h1>
        <p>20 vybraných děl české a světové literatury</p>

        <!-- Vyhledávání -->
        <div class="search-container">
            <svg class="search-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
            <input type="text" id="search-input" class="search-input" placeholder="Hledej knihu nebo autora..." autocomplete="off">
            <button class="search-clear" id="search-clear" aria-label="Vymazat hledání">&times;</button>
        </div>
        <div class="results-count" id="results-count"></div>
    </header>

    <main>
        <!-- Filtrování podle období -->
        <div class="filter-bar" id="filter-bar">
            <button class="filter-btn active" data-obdobi="all" onclick="setFilter(null)">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg>
                Vše
            </button>
            <button class="filter-btn" data-obdobi="fav" onclick="setFilter('fav')">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>
                Oblíbené
            </button>
            <button class="filter-btn" data-obdobi="1" onclick="setFilter(1)">I. Do konce 18. st.</button>
            <button class="filter-btn" data-obdobi="2" onclick="setFilter(2)">II. 19. století</button>
            <button class="filter-btn" data-obdobi="3" onclick="setFilter(3)">III. Světová 20./21. st.</button>
            <button class="filter-btn" data-obdobi="4" onclick="setFilter(4)">IV. Česká 20./21. st.</button>
        </div>

        <!-- Zde se automaticky načte 20 knih z JavaScriptu -->
        <div id="books-grid" class="books-grid"></div>
    </main>

    <!-- Footer -->
    <footer class="site-footer">
        <div class="footer-content">
            <p class="footer-title">Maturitní Knihy</p>
            <p class="footer-sub">Digitální čtenářský deník — 20 vybraných děl k maturitě z češtiny</p>
            <div class="footer-links">
                <a href="https://github.com/Datlik/Maturitni-knizky" target="_blank" rel="noopener" aria-label="GitHub repozitář" class="footer-github-link">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
                        <path fill-rule="evenodd" clip-rule="evenodd" d="M12 2C6.477 2 2 6.477 2 12c0 4.418 2.865 8.166 6.839 9.489.5.092.682-.217.682-.482 0-.237-.008-.866-.013-1.7-2.782.603-3.369-1.34-3.369-1.34-.454-1.156-1.11-1.463-1.11-1.463-.908-.62.069-.608.069-.608 1.003.07 1.531 1.03 1.531 1.03.892 1.529 2.341 1.087 2.91.831.092-.646.35-1.086.636-1.336-2.22-.253-4.555-1.11-4.555-4.943 0-1.091.39-1.984 1.029-2.683-.103-.253-.446-1.27.098-2.647 0 0 .84-.269 2.75 1.025A9.578 9.578 0 0112 6.836c.85.004 1.705.114 2.504.336 1.909-1.294 2.747-1.025 2.747-1.025.546 1.377.203 2.394.1 2.647.64.699 1.028 1.592 1.028 2.683 0 3.842-2.339 4.687-4.566 4.935.359.309.678.919.678 1.852 0 1.336-.012 2.415-.012 2.743 0 .267.18.578.688.48C19.138 20.161 22 16.416 22 12c0-5.523-4.477-10-10-10z"></path>
                    </svg>
                </a>
                <span class="footer-dot">·</span>
                <span>© 2026</span>
            </div>
        </div>
    </footer>

    <!-- Modální okno (vyskakovací vrstva po kliknutí na knihu) -->
    <div id="book-modal" class="modal hidden">
        <div class="modal-content glass-effect">
            <button id="close-modal" class="close-btn" aria-label="Zavřít">&times;</button>
            <div id="modal-body"></div>
        </div>
    </div>

    <!-- Kvízový modal -->
    <div id="quiz-modal" class="quiz-modal hidden">
        <div class="quiz-content">
            <button class="close-btn" id="close-quiz" aria-label="Zavřít kvíz">&times;</button>
            <div id="quiz-body"></div>
        </div>
    </div>

    <!-- Odkaz na JavaScriptovou logiku -->
    <script src="main.js"></script>
    <script src="data-extra.js"></script>
</body>
</html>
